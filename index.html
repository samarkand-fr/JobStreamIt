<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="JustStreamIt – Découvrez les meilleurs films avec notre interface inspirée par le cinéma.">
    <title>JustStreamIt</title>

    <!-- FONTS: Oswald for headings, Inter for body, and Oranienbaum for classic accents -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Oswald:wght@300;400;600;700&family=Oranienbaum&display=swap" rel="stylesheet">
    
    <!-- MODULAR CSS: Separated by concern for better maintainability -->
    <link rel="stylesheet" href="css/base.css">       <!-- Variables and CSS Reset -->
    <link rel="stylesheet" href="css/layout.css">     <!-- Header, Containers and Utility classes -->
    <link rel="stylesheet" href="css/hero.css">       <!-- Best Movie (Hero) Section Styles -->
    <link rel="stylesheet" href="css/movie-grid.css"> <!-- Movie Grid, Card layouts and Animations -->
    <link rel="stylesheet" href="css/forms.css">      <!-- Custom Genre Dropdown Select Styles -->
    <link rel="stylesheet" href="css/buttons.css">    <!-- Global Button variants -->
    <link rel="stylesheet" href="css/modal.css">      <!-- Responsive Modal Overlay Styles -->
</head>

<body>
    <a href="#hero" class="skip-link">Passer au contenu principal</a>
    <div class="page-container">
        <!-- HEADER: Brand Logo and Application Title -->
        <header id="main-header" class="main-header" >
            <h1 class="sr-only">JustStreamIt - Découvrez les meilleurs films</h1>
            <figure class="logo-container">
                <img src="assets/img/logo.png" alt="JustStreamIt Logo" class="logo-img">
            </figure>
            <div class="header-text" id="header-text">
                <p role="presentation" aria-hidden="true">Vidéos à la demande</p>
            </div>
        </header>

        <main class="main-content" >
            
            <!-- BEST MOVIE (HERO) SECTION: Highlighted top-rated movie -->
            <section id="hero" aria-labelledby="best-movie-heading">
                <header class="section-title">
                    <h2 id="best-movie-heading" class="section-heading-text">Meilleur film</h2>
                </header>
                <article id="best-movie" class="hero-card">
                    <figure class="hero-img-col">
                        <!-- fetchpriority="high" tells the browser to prioritize this critical above-the-fold asset -->
                        <img id="best-movie-img" src="assets/img/placeholder.png" alt="Affiche du meilleur film" fetchpriority="high" width="227" height="334">
                    </figure>
                    <div class="hero-content">
                        <h3 id="best-movie-title" class="hero-title">Chargement...</h3>
                        <p id="best-movie-summary" class="hero-summary">Chargement du résumé...</p>
                        <!-- Button triggers the modal via main.js -->
                        <button id="best-movie-details" class="hero-details-btn btn-primary" aria-label="Voir les détails du meilleur film">Détails</button>
                    </div>
                </article>
            </section>

            <!-- DYNAMIC SECTIONS: Container for category carousels injected by ui.js -->
            <div id="dynamic-categories"></div>

            <!-- "AUTRES" SECTION: Dynamic genre exploration -->
            <section id="custom" class="genre-selector-container" aria-labelledby="custom-heading">
                <header class="section-title genre-section-title">
                    <h2 id="custom-heading" class="section-heading-text">Autres:</h2>
                    
                    <!-- CUSTOM DROPDOWN: Designed to match Figma mocks (Listbox pattern) -->
                    <div id="custom-dropdown-container" class="dropdown-relative-container">
                        <button id="genre-select-trigger" class="genre-select-trigger-btn" aria-haspopup="listbox" aria-expanded="false" aria-label="Ouvrir le menu de sélection des genres">
                            <span id="genre-select-value" class="pointer-events-none">Comédies</span>
                            <svg id="genre-select-arrow" class="dropdown-arrow pointer-events-none" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                                <path d="M7 10l5 5 5-5z"></path>
                            </svg>
                        </button>
                        <div id="genre-options-list" class="genre-options-list-container hidden-element" role="listbox" aria-label="Liste des genres disponibles">
                            <!-- Populated with genre items via main.js during initialization -->
                        </div>
                    </div>
                </header>
                
                <!-- Results Grid for the selected genre -->
                <div id="custom-grid" class="hidden-element movie-grid" role="list" aria-label="Grille des films par genre"></div>
                
                <!-- Initial Placeholder before a search is performed -->
                <div id="custom-placeholder" class="placeholder-box" aria-live="polite">
                    <span class="placeholder-text">Catégorie choisie dans le menu déroulant</span>
                </div>

                <!-- "Voir plus" toggle button: Visible only when data exceeds display thresholds -->
                <div id="custom-more-container" class="more-btn-container hidden-element">
                    <button id="custom-more" class="more-btn btn-primary" aria-label="Afficher plus de films pour la catégorie sélectionnée">Voir plus</button>
                </div>
            </section>
        </main>
    </div>

    <!-- MODAL OVERLAY: Displays detailed movie data (Cast, Box Office, Director, etc.) -->
    <dialog id="movie-modal" class="modal-wrapper hidden-element" aria-modal="true" aria-labelledby="modal-title-desc">
        <div id="modal-overlay" class="modal-overlay"></div>
        <div class="modal-container">
            <h2 id="modal-title-desc" class="hidden-element">Détails du film</h2>
            <button id="close-modal" class="hidden-element" aria-label="Fermer la fenêtre modale">&times;</button>
            <div id="modal-content">
                <!-- Data is dynamically injected here by modal.js -->
            </div>
        </div>
    </dialog>

    <!-- REUSABLE TEMPLATES: Efficiently cloned by ui.js to build the interface -->
    
    <!-- Template for an individual movie card in a grid -->
    <template id="movie-card-tpl">
        <article class="movie-card movie-card-base group" tabindex="0" role="listitem">
            <img class="card-img" alt="" loading="lazy" width="182" height="268">
            <div class="overlay-band">
                <div class="card-title-container">
                    <h3 class="card-title">Titre</h3>
                </div>
                <div class="card-details-btn-wrapper">
                    <button class="card-details-btn" aria-label="Voir les détails du film">Détails</button>
                </div>
            </div>
        </article>
    </template>

    <!-- Template for a whole category section (Title + Grid + Buttons) -->
    <template id="category-section-tpl">
        <section class="category-section">
            <header class="section-title">
                <h2 class="section-heading-text"></h2>
            </header>
            <div class="movie-grid" role="list"></div>
            <div class="more-btn-container hidden-element">
                <button class="more-btn btn-primary">Voir plus</button>
            </div>
        </section>
    </template>

    <!-- JAVASCRIPT LOADING ORDER: Logic follows a dependency chain (Config -> UI/API -> Modal -> Main) -->
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
